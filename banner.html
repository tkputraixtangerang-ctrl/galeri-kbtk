<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero Banner - KB-TK Putra IX</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #000; overflow: hidden; font-family: 'Nunito', sans-serif; }

  .slider-wrap {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.8s ease;
    background: #1a1a2e;
  }
  .slide.active { opacity: 1; }

  .slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .slide-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.15) 60%, transparent 100%);
  }

  .slide-text {
    position: absolute;
    bottom: 60px;
    left: 48px;
    right: 48px;
    color: #fff;
  }
  .slide-title {
    font-size: clamp(1.4rem, 4vw, 2.4rem);
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 10px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.5);
  }
  .slide-sub {
    font-size: clamp(0.85rem, 2vw, 1.1rem);
    opacity: 0.9;
    text-shadow: 0 1px 6px rgba(0,0,0,0.5);
  }

  /* NAV ARROWS */
  .nav-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.18);
    border: 2px solid rgba(255,255,255,0.3);
    color: #fff;
    width: 44px; height: 44px;
    border-radius: 50%;
    font-size: 1.2rem;
    cursor: pointer;
    backdrop-filter: blur(6px);
    transition: background 0.2s;
    display: flex; align-items: center; justify-content: center;
    z-index: 10;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.35); }
  .nav-prev { left: 16px; }
  .nav-next { right: 16px; }

  /* DOTS */
  .dots {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 10;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    cursor: pointer;
    transition: all 0.3s;
  }
  .dot.active {
    background: #fff;
    width: 24px;
    border-radius: 4px;
  }

  /* PROGRESS BAR */
  .progress-bar {
    position: absolute;
    bottom: 0; left: 0;
    height: 3px;
    background: #FFD700;
    width: 0%;
    transition: width linear;
    z-index: 10;
  }

  /* EMPTY STATE */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    color: rgba(255,255,255,0.5);
    font-size: 1rem;
    gap: 12px;
    background: linear-gradient(135deg, #1a1a2e, #2d1b4e);
  }
  .empty-state .icon { font-size: 3rem; }

  /* LOADING */
  .loading-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: linear-gradient(135deg, #1a1a2e, #2d1b4e);
  }
  .loader {
    width: 40px; height: 40px;
    border: 4px solid rgba(255,255,255,0.15);
    border-top-color: #FFD700;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&display=swap" rel="stylesheet">
</head>
<body>

<div id="root">
  <div class="loading-screen"><div class="loader"></div></div>
</div>

<script>
// ============================================================
//  GANTI URL INI DENGAN URL APPS SCRIPT KAMU
// ============================================================
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzhblsJ-N7V9gqntHjgmD9ED31dtulchTC-_AlFkN4pI-7Aj-lbJE6mgNvrhkpSAKhWmA/exec';
// ============================================================

const INTERVAL = 5000; // ganti interval (ms) antar slide, default 5 detik
let banners = [];
let current = 0;
let timer = null;
let progressTimer = null;

async function init() {
  try {
    const res = await fetch(`${APPS_SCRIPT_URL}?type=banner&t=${Date.now()}`);
    banners = await res.json();
    banners.sort((a, b) => Number(a.urutan) - Number(b.urutan));
  } catch(e) {
    banners = [];
  }
  render();
}

function render() {
  const root = document.getElementById('root');
  if (!banners.length) {
    root.innerHTML = `
      <div class="empty-state">
        <div class="icon">🖼️</div>
        <div>Belum ada banner yang ditambahkan.</div>
      </div>`;
    return;
  }

  root.innerHTML = `
    <div class="slider-wrap" id="slider">
      ${banners.map((b, i) => `
        <div class="slide${i === 0 ? ' active' : ''}" id="slide-${i}">
          <img src="https://drive.google.com/thumbnail?id=${b.id}&sz=w1280"
               alt="${b.judul || ''}"
               onerror="this.style.display='none'">
          <div class="slide-overlay"></div>
          <div class="slide-text">
            ${b.judul ? `<div class="slide-title">${b.judul}</div>` : ''}
            ${b.subjudul ? `<div class="slide-sub">${b.subjudul}</div>` : ''}
          </div>
        </div>
      `).join('')}

      ${banners.length > 1 ? `
        <button class="nav-btn nav-prev" onclick="go(-1)">&#8592;</button>
        <button class="nav-btn nav-next" onclick="go(1)">&#8594;</button>
      ` : ''}

      <div class="dots" id="dots">
        ${banners.map((_, i) => `<div class="dot${i === 0 ? ' active' : ''}" onclick="goTo(${i})"></div>`).join('')}
      </div>

      <div class="progress-bar" id="progress-bar"></div>
    </div>`;

  if (banners.length > 1) startAuto();
}

function goTo(n) {
  document.getElementById('slide-' + current)?.classList.remove('active');
  document.querySelectorAll('.dot')[current]?.classList.remove('active');
  current = (n + banners.length) % banners.length;
  document.getElementById('slide-' + current)?.classList.add('active');
  document.querySelectorAll('.dot')[current]?.classList.add('active');
  resetProgress();
}

function go(dir) {
  clearTimers();
  goTo(current + dir);
  startAuto();
}

function startAuto() {
  clearTimers();
  resetProgress();
  timer = setTimeout(() => { goTo(current + 1); startAuto(); }, INTERVAL);
}

function resetProgress() {
  const bar = document.getElementById('progress-bar');
  if (!bar) return;
  bar.style.transition = 'none';
  bar.style.width = '0%';
  requestAnimationFrame(() => {
    bar.style.transition = `width ${INTERVAL}ms linear`;
    bar.style.width = '100%';
  });
}

function clearTimers() {
  clearTimeout(timer);
  clearTimeout(progressTimer);
}

// Pause on hover
document.addEventListener('mouseover', e => {
  if (e.target.closest('#slider')) clearTimeout(timer);
});
document.addEventListener('mouseout', e => {
  if (e.target.closest('#slider') && banners.length > 1) startAuto();
});

// Touch / swipe
let touchX = 0;
document.addEventListener('touchstart', e => touchX = e.touches[0].clientX);
document.addEventListener('touchend', e => {
  const diff = touchX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 40) go(diff > 0 ? 1 : -1);
});

init();
</script>
</body>
</html>
